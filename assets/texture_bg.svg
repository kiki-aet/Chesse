<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0b0f"/>
      <stop offset="1" stop-color="#141418"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="t"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#g)" />
  <!-- subtle vignette -->
  <radialGradient id="v" cx="50%" cy="50%" r="70%">
    <stop offset="50%" stop-color="#000" stop-opacity="0" />
    <stop offset="100%" stop-color="#000" stop-opacity="0.45" />
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#v)"/>
  <!-- grain -->
  <rect width="100%" height="100%" fill="#fff" opacity="0.02" filter="url(#grain)" />

  <!-- faint diagonal stripes -->
  <g opacity="0.03" fill="#fff">
    <rect x="-200" y="0" width="60" height="1400" transform="rotate(-20)"/>
    <rect x="-120" y="0" width="60" height="1400" transform="rotate(-20)"/>
    <rect x="-40" y="0" width="60" height="1400" transform="rotate(-20)"/>
  </g>
</svg>
