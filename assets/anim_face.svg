<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="g" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="40%" stop-color="#2b0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="#060606" />

  <!-- eyes -->
  <g transform="translate(120,80)">
    <ellipse cx="110" cy="60" rx="70" ry="45" fill="#f9f9f9"/>
    <ellipse cx="350" cy="60" rx="70" ry="45" fill="#f9f9f9"/>
    <circle cx="110" cy="60" r="18" fill="#000"/>
    <circle cx="350" cy="60" r="18" fill="#000"/>
    <circle cx="100" cy="54" r="6" fill="#fff" opacity="0.9"/>
    <circle cx="340" cy="54" r="6" fill="#fff" opacity="0.9"/>
  </g>

  <!-- mouth -->
  <g transform="translate(120,200)">
    <path d="M 40 40 Q 200 120 360 40 Q 300 160 200 160 Q 100 160 40 40 Z" fill="#8b0000" />
    <rect x="90" y="80" width="220" height="30" fill="#ffffff" opacity="0.06" />
  </g>

  <!-- subtle teeth lines -->
  <g transform="translate(120,200)" stroke="#fff" stroke-opacity="0.07" stroke-width="2">
    <line x1="110" y1="80" x2="110" y2="120" />
    <line x1="150" y1="80" x2="150" y2="120" />
    <line x1="190" y1="80" x2="190" y2="120" />
    <line x1="230" y1="80" x2="230" y2="120" />
    <line x1="270" y1="80" x2="270" y2="120" />
  </g>

  <!-- faint overlay -->
  <rect width="100%" height="100%" fill="url(#g)" opacity="0.5" />
</svg>
