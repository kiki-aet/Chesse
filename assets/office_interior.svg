<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- window / door area -->
  <g transform="translate(120,60)">
    <rect x="0" y="0" width="660" height="420" rx="6" fill="#050505" stroke="#222" stroke-width="6"/>
    <!-- desk -->
    <rect x="30" y="320" width="600" height="90" rx="6" fill="#231815" />
    <!-- monitor -->
    <rect x="60" y="40" width="220" height="140" rx="6" fill="#0b0b0b" stroke="#2b2b2b"/>
    <rect x="72" y="54" width="196" height="112" rx="4" fill="#071010" />

    <!-- small lamp -->
    <rect x="300" y="40" width="18" height="60" fill="#2b2b2b"/>
    <ellipse cx="309" cy="110" rx="48" ry="18" fill="#24190f"/>

    <!-- poster on wall -->
    <rect x="520" y="40" width="90" height="120" rx="4" fill="#1c1010"/>
    <text x="530" y="110" fill="#6cf" font-family="sans-serif" font-size="18">CHESSE</text>

    <!-- door / office window to hallway -->
    <g transform="translate(220,40)">
      <rect x="0" y="0" width="220" height="300" fill="#0a0a0a" stroke="#141414" stroke-width="6" rx="6"/>
      <!-- door frame light -->
      <rect x="12" y="12" width="196" height="276" rx="4" fill="#060606"/>
      <!-- faint hallway depth -->
      <rect x="20" y="40" width="176" height="220" fill="#0b0b0b"/>
      <rect x="28" y="70" width="160" height="160" fill="#070707"/>
    </g>

    <!-- small props -->
    <rect x="40" y="180" width="120" height="12" fill="#170f0a" opacity="0.6"/>
    <rect x="40" y="202" width="120" height="12" fill="#170f0a" opacity="0.5"/>
  </g>

  <!-- vignette -->
  <radialGradient id="v" cx="50%" cy="50%">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#v)" />
</svg>
