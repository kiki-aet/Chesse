<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Five Nights at Chesse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Five Nights at Chesse</h1>

  <div id="hud">
    <div>Time: <span id="time">0</span>s</div>
    <div>Power: <span id="power">100</span>%</div>
    <div>
      Doors:
      <button id="door-left" class="door">Left: Open</button>
      <button id="door-right" class="door">Right: Open</button>
    </div>
  </div>

  <div id="controls">
    <div id="cameras">
      <h2>Cameras</h2>
      <div id="cams"></div>
    </div>

    <div id="view">
      <h2>Camera view</h2>
      <div id="view-content">Select a camera</div>
    </div>
  </div>

  <div id="message"></div>
  <div id="actions">
    <button id="toggle-desk">Toggle Desk View (D)</button>
    <button id="restart">Restart</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
